    <style>
        .contact-container {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
        }

        .contact-card {
            background: linear-gradient(180deg, rgba(24, 24, 27, 0.4) 0%, rgba(9, 9, 11, 0.4) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 3rem 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .contact-heading {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-value {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--primary);
            word-break: break-all;
        }

        .contact-value a {
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .contact-value a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <!-- 1. Beautiful Animated Background & Spotlight -->
    <div class="background-fx">

            <a href="about.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;">About</a>
            <a href="contact.html" class="nav-link" style="color: var(--primary); text-decoration: none; transition: color 0.3s;">Contact</a>
        </div>
    </nav>

    <main class="container" style="padding-top: 2rem;">
        <div class="contact-container">
            <div class="contact-card">
                <h1 class="contact-heading" style="background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Get in Touch</h1>

                <div class="contact-info">
                    <div class="contact-item">
                        <span class="contact-label">Email Address</span>
                        <span class="contact-value"><a
                                href="mailto:abdullahcyberx@gmail.com">abdullahcyberx@gmail.com</a></span>
                    </div>

                    <div class="contact-item">
                        <span class="contact-label">Discord</span>

                    </div>

                    <div class="contact-item">

                                rel="noopener noreferrer">Hafiz Muhammad Abdullah</a></span>
                    </div>
                </div>

                <a href="index.html" class="back-link">&larr; Back to Home</a>
            </div>
        </div>
    </main>

    <footer class="main-footer" style="text-align: center; padding: 2rem 0; width: 100%; z-index: 10;">
        <p style="margin: 0; font-size: 1rem; color: var(--text-secondary);">
            Made with <span style="color: #e25555;">&hearts;</span> by <span class="highlight"
                style="font-weight: 600; color: var(--text-primary);">Shehzada</span>
