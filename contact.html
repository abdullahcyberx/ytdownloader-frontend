    <style>
        .contact-container {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
        }

        .contact-heading {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-value {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--primary);
            word-break: break-all;
        }

        .contact-value a {
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .contact-value a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
