<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- SEO Meta Tags -->
    <title>TikTok Video Downloader Without Watermark (MP4)</title>
    <meta name="description"
        content="Free online TikTok video downloader. Download TikTok videos without watermark in HD instantly." />

    <!-- Core SEO Meta -->
    <link rel="canonical" href="https://tiktok.shehzada.tech/" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="/assets/img/favicon.ico">
    <link rel="preconnect" href="https://video-downloader-production-f0a1.up.railway.app" crossorigin>
    <meta name="theme-color" content="#000000">

    <!-- Open Graph -->
    <meta property="og:title" content="Shehzada TikTok Video Downloader - Fast & Free" />
    <meta property="og:description"
        content="Download TikTok videos without watermark in HD instantly. Fast, free & secure." />
    <meta property="og:image" content="https://tiktok.shehzada.tech/assets/img/og-image.jpg" />
    <meta property="og:url" content="https://tiktok.shehzada.tech/" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TikTok Downloader Without Watermark | Shehzada Video Saver" />
    <meta name="twitter:description"
        content="Top free online video saver tool. Download TikTok videos without watermark in HD." />
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "WebSite",
      "name": "Shehzada TikTok Downloader",
      "url": "https://tiktok.shehzada.tech/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tiktok.shehzada.tech/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Shehzada TikTok Video Downloader",
      "description": "Download TikTok videos directly to MP4 in HD without watermarks.",
      "operatingSystem": "Web",
      "applicationCategory": "MultimediaApplication",
      "url": "https://tiktok.shehzada.tech/",
      "featureList": [
        "TikTok Video Downloader",
        "TikTok Watermark Remover"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1450"
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- 1. Beautiful Animated Background & Spotlight -->
    <div class="background-fx">
        <!-- Optional: Large animated brand name in background -->
        <div class="bg-brand-text">TIKTOK</div>
    </div>
    
    <!-- Navigation -->
    <nav class="top-nav container fade-in-up" style="padding-top: 1.5rem; padding-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; margin: 0 auto; z-index: 10;">
        <a href="index.html" class="nav-logo"
            style="text-decoration: none; color: white; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px;">Shehzada</a>
        <div class="nav-links" style="display: flex; gap: 1.5rem;">
            <a href="index.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;">Tools</a>
            <a href="blog/index.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;">Blog</a>
            <a href="about.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;">About</a>
            <a href="contact.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;">Contact</a>
        </div>
    </nav>


    <!-- 2. Responsive Main Layout -->
    <main class="container">
        
        <!-- Animated Header/Hero Section -->
        <header class="hero">
            <h1>TikTok Downloader Without Watermark</h1>
            <p>Paste a TikTok URL below to instantly fetch high-quality MP4 formats.</p>
        </header>
        <!-- 3. The Premium Glowing Card -->
        <section class="pro-card">
            
            <form id="downloadForm" style="display: flex; flex-direction: column;">
                <div style="display: flex; position: relative;">
                    <input type="url" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/..." required autocomplete="off" style="padding-right: 80px;">
                    <button type="button" id="pasteBtn" class="paste-btn" title="Paste from clipboard" style="display: flex; align-items: center; justify-content: center; gap: 4px; position: absolute; right: 8px; top: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 12px; padding: 4px 8px; border-radius: 6px; cursor: pointer; height: auto;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <span>Paste</span>
                    </button>
                </div>
                <button type="submit" id="fetchBtn" class="primary-btn">
                     <span class="btn-text">Get Video</span>
                     <div class="spinner hidden"></div>
                </button>
            </form>
        </section>

        <!-- Result Card (Hidden by default) -->
        <section id="resultCard" class="pro-card result-container hidden" style="margin-top: -10px;">
            <div class="video-info" style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                <div class="thumbnail-wrapper" style="flex: 1; min-width: 250px; border-radius: 12px; overflow: hidden;">
                    <img id="videoThumb" src="" alt="Video Thumbnail" width="320" height="180" loading="lazy" style="width: 100%; height: auto; display: block; object-fit: cover;">
                </div>
                <div class="details" style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 10px;">
                    <h3 id="videoTitle" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 5px;">Video Title</h3>
                    <p class="duration" style="color: var(--text-secondary);">Duration: <span id="videoDuration">0:00</span></p>

                    <div class="download-controls" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                        <select id="formatSelect" class="styled-select" style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--border-subtle); outline: none;">
                            <!-- Populated dynamically -->
                        </select>
                        <button id="startDownloadBtn" class="primary-btn pulse">
                            <span>Download Now</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Progress Section (Hidden by default) -->
            <div id="progressSection" class="progress-section hidden" style="margin-top: 20px; border-top: 1px solid var(--border-subtle); padding-top: 20px;">
                <div class="progress-header" style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: var(--text-secondary);">
                    <span id="progressStatusText">Starting download...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg" style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                    <div id="progressBar" class="progress-bar-fill" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease;"></div>
                </div>

                <a id="finalDownloadLink" class="primary-btn hidden" download style="margin-top: 15px; text-align: center; text-decoration: none;">
                    Save File to Device
                </a>
            </div>
        </section>


    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>


    <!-- Footer -->
    <footer class="main-footer" style="text-align: center; padding: 2rem 0; width: 100%; z-index: 10;">
        <p style="margin: 0; font-size: 1rem; color: var(--text-secondary);">
            Made with <span style="color: #e25555;">&hearts;</span> by <span class="highlight"
                style="font-weight: 600; color: var(--text-primary);">Shehzada</span>
        </p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
